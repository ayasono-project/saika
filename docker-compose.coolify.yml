# ─────────────────────────────────────────────────────
# saika Coolify デプロイ用 compose ファイル
# ─────────────────────────────────────────────────────
# Coolify が Git push をトリガーに自動でビルド・デプロイする。
# 環境変数は Coolify の管理画面「Environment Variables」で設定すること。
#
# ボリューム名は Coolify がアプリ ID をプレフィックスとして付与する。
# 例: sqlite_data → <app-id>_sqlite_data
# Coolify 管理画面 > Storages でマッピングを確認できる。

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    command: node dist/bot/main.js
    restart: unless-stopped
    environment:
      # --- 必須（Coolify の Environment Variables で設定） ---
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_APP_ID: ${DISCORD_APP_ID}
      DATABASE_URL: ${DATABASE_URL:-file:./storage/db.sqlite}
      LOCALE: ${LOCALE:-ja}
      NODE_ENV: ${NODE_ENV:-production}
      # --- 任意 ---
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DISCORD_ERROR_WEBHOOK_URL: ${DISCORD_ERROR_WEBHOOK_URL:-}
      USER_MANUAL_URL: ${USER_MANUAL_URL:-}
    volumes:
      # SQLite データの永続化（Coolify が名前付きボリュームを管理）
      - sqlite_data:/app/storage
      # ログファイルの永続化（ホストバインドマウント）
      - /opt/saika/logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  sqlite_data:
