# ─────────────────────────────────────────────────────
# saika Coolify デプロイ用 compose ファイル
# ─────────────────────────────────────────────────────
# Coolify が Git push をトリガーに自動でビルド・デプロイする。
# 実際の値（シークレット含む）は Coolify の管理画面「Environment Variables」で
# 設定し、ここでは ${VAR} で参照する（このファイルに値を直書きしない）。
#
# DB は同一 Coolify プロジェクト内のマネージド PostgreSQL に接続する。
# DATABASE_URL は Coolify の Environment Variables で接続文字列を設定すること。

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    command: node dist/main.js
    restart: unless-stopped
    environment:
      # ── Discord（必須） ──
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_APP_ID: ${DISCORD_APP_ID}

      # ── データベース（必須・マネージド PostgreSQL の接続文字列） ──
      # 例: postgresql://saika_app:****@<db-host>:5432/saika?schema=public
      DATABASE_URL: ${DATABASE_URL}

      # ── 基本 ──
      LOCALE: ${LOCALE:-ja}
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # ── web ダッシュボード API（必須） ──
      # web BFF と「完全に同一」の JWT 署名鍵（HMAC）。ズレると per-guild が全 401。
      JWT_SECRET: ${JWT_SECRET}
      # SPA のオリジン（CORS 許可元）。例: https://saika-dash.sonozaki.net
      WEB_ORIGIN: ${WEB_ORIGIN}
      # API サーバーの起動可否・待受（既定: 有効 / 0.0.0.0 / 8080）。
      API_ENABLED: ${API_ENABLED:-true}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8080}

      # ── 任意 ──
      DISCORD_ERROR_WEBHOOK_URL: ${DISCORD_ERROR_WEBHOOK_URL:-}
      USER_MANUAL_URL: ${USER_MANUAL_URL:-}
      # /help にダッシュボード案内を出す（ダッシュボード本番稼働後に設定）。
      # 例: https://saika-dash.sonozaki.net
      DASHBOARD_URL: ${DASHBOARD_URL:-}
    ports:
      # web ダッシュボード API。Cloudflare Tunnel が 127.0.0.1:8081 に転送する。
      # ホスト側は 8081（8080 は coolify-proxy が使用済みのため回避）、コンテナ側は
      # API_PORT(=8080)。127.0.0.1 バインドで公開IFには晒さない（tunnel 経由のみ）。
      - "127.0.0.1:8081:8080"
    volumes:
      # ログファイルの永続化（ホストバインドマウント）
      - /opt/saika/logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
