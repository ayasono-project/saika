# ─────────────────────────────────────────────────────
# saika Coolify デプロイ用 compose ファイル
# ─────────────────────────────────────────────────────
# Coolify が Git push をトリガーに自動でビルド・デプロイする。
# 環境変数は Coolify の管理画面「Environment Variables」で設定すること。
#
# DB は同一 Coolify プロジェクト内のマネージド PostgreSQL に接続する。
# DATABASE_URL は Coolify の Environment Variables で接続文字列を設定すること。

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    command: node dist/main.js
    restart: unless-stopped
    environment:
      # --- 必須（Coolify の Environment Variables で設定） ---
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_APP_ID: ${DISCORD_APP_ID}
      # PostgreSQL 接続文字列（マネージド DB）。例:
      #   postgresql://saika_app:****@<db-host>:5432/saika?schema=public
      DATABASE_URL: ${DATABASE_URL}
      LOCALE: ${LOCALE:-ja}
      NODE_ENV: ${NODE_ENV:-production}
      # --- 任意 ---
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DISCORD_ERROR_WEBHOOK_URL: ${DISCORD_ERROR_WEBHOOK_URL:-}
      USER_MANUAL_URL: ${USER_MANUAL_URL:-}
    volumes:
      # ログファイルの永続化（ホストバインドマウント）
      - /opt/saika/logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
